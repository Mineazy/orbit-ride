# Render.com Blueprint Specification for OrbitRide
services:
  # Option A: Static Site (Recommended, Free Tier, highly optimized CDN)
  - type: static
    name: orbit-ride-static
    env: static
    buildCommand: npm run build:command-center
    publishDir: dist
    envVars:
      - key: VITE_SUPABASE_URL
        value: YOUR_SUPABASE_URL_ON_RENDER
      - key: VITE_SUPABASE_ANON_KEY
        value: YOUR_SUPABASE_ANON_KEY_ON_RENDER

  # Option B: Web Service (NodeJS Container serving the build)
  - type: web
    name: orbit-ride-webservice
    env: node
    plan: free
    buildCommand: npm install && npm run build:command-center
    startCommand: node server.js
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: NODE_ENV
        value: production
